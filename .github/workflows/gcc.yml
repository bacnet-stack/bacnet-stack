name: GCC

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '*'

jobs:
  bip-apps:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Create Build Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq libconfig-dev
    - name: Build Demo Apps GNU89
      run: |
        gcc --version
        make clean
        make CSTANDARD="-std=gnu89" all
    - name: Build Demo Apps GNU99
      run: |
        make clean
        make CSTANDARD="-std=gnu99" all
    - name: Build Demo Apps GNU11
      run: |
        make clean
        make CSTANDARD="-std=gnu11" all
    - name: Build Demo Apps GNU17
      run: |
        make clean
        make CSTANDARD="-std=gnu17" all

  bip-no-bbmd-apps:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Create Build Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq libconfig-dev
    - name: Build Demo Apps BBMD=none
      run: |
        gcc --version
        make clean
        make BBMD=none all

  bip-client-bbmd-apps:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Create Build Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq libconfig-dev
    - name: Build Demo Apps BBMD=client
      run: |
        gcc --version
        make clean
        make BBMD=client all

  gateway:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Create Build Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq libconfig-dev
    - name: Build Gateway Demo
      run: |
        gcc --version
        make clean
        make gateway

  bacnet-sc-hub:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout BACnet Stack
      uses: actions/checkout@v7
    - name: Checkout libwebsockets
      uses: actions/checkout@v7
      with:
        repository: warmcat/libwebsockets
        ref: v4.3-stable
        path: libwebsockets
    - name: Create BACnet/SC Build Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq libconfig-dev
        sudo apt-get install -qq libcap-dev
        sudo apt-get install -qq libssl-dev
        sudo apt-get install -qq libuv1-dev
        bash -c 'cd libwebsockets;mkdir build;cd build;cmake .. -DLWS_WITH_LIBUV=ON -DLWS_WITH_MINIMAL_EXAMPLES=0 -DLWS_MAX_SMP=32 -DCMAKE_POLICY_VERSION_MINIMUM=3.5;make'
        sudo bash -c 'cd libwebsockets;cd build;make install'
    - name: Build BACnet/SC Hub Demo
      run: |
        gcc --version
        pwd
        ls -al
        make clean
        make sc-hub

  router:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout BACnet Stack
      uses: actions/checkout@v7
    - name: Checkout libwebsockets
      uses: actions/checkout@v7
      with:
        repository: warmcat/libwebsockets
        ref: v4.3-stable
        path: libwebsockets
    - name: Create Build Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq libconfig-dev
        sudo apt-get install -qq libcap-dev
        sudo apt-get install -qq libssl-dev
        sudo apt-get install -qq libuv1-dev
        bash -c 'cd libwebsockets;mkdir build;cd build;cmake .. -DLWS_WITH_LIBUV=ON -DLWS_WITH_MINIMAL_EXAMPLES=0 -DLWS_MAX_SMP=32 -DCMAKE_POLICY_VERSION_MINIMUM=3.5;make'
        sudo bash -c 'cd libwebsockets;cd build;make install'
    - name: Build Router Demo
      run: |
        gcc --version
        pwd
        ls -al
        make clean
        make router

  router-ipv6:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Create Build Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq libconfig-dev
    - name: Build Router IPv6 Demo
      run: |
        gcc --version
        make clean
        make router-ipv6

  router-mstp:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Create Build Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq libconfig-dev
    - name: Build Router MSTP Demo
      run: |
        gcc --version
        make clean
        make router-mstp

  bip6:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Create Build Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq libconfig-dev
    - name: Build BACnet/IPv6 Demo Apps
      run: |
        gcc --version
        make clean
        make bip6

  mstp:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Create Build Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq libconfig-dev
    - name: Build MSTP Demo Apps
      run: |
        gcc --version
        make clean
        make mstp

  ethernet:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Create Build Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq libconfig-dev
        sudo apt-get install -qq libcap-dev
    - name: Build Ethernet Demo Apps
      run: |
        gcc --version
        make clean
        make ethernet

  ports-arm-makefile:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Create Build Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq build-essential
        sudo apt-get install -qq gcc-arm-none-eabi
        sudo apt-get install -qq libnewlib-arm-none-eabi
    - name: ports-arm-makefile
      run: |
        make clean
        arm-none-eabi-gcc --version
        make stm32f10x
        make stm32f4xx
        make at91sam7s

  ports-arm-cmake:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Create Build Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq build-essential
        sudo apt-get install -qq gcc-arm-none-eabi
        sudo apt-get install -qq libnewlib-arm-none-eabi
        sudo apt-get install -qq cmake
    - name: ports-arm-cmake
      run: |
        arm-none-eabi-gcc --version
        make stm32f4xx-cmake
        make at91sam7s-cmake
        make pico-cmake

  ports-avr:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Create Build Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq build-essential
        sudo apt-get install -qq gcc-avr avr-libc binutils-avr
    - name: ports-avr
      run: |
        avr-gcc --version
        make atmega328
        make bdk-atxx4-mstp
        make xplained

  ports-lwip:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Create Build Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq build-essential
        sudo apt-get install -qq liblwip-dev
    - name: ports-lwip
      run: |
        make lwip

  mingw:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Create Build Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq build-essential
        sudo apt-get install -qq mingw-w64
        i686-w64-mingw32-gcc --version
    - name: Build Win32 Demo BACnet/IP Apps
      run: make PREFIX=i686-w64-mingw32- BACNET_PORT=win32 clean bip
    - name: Build Win32 Demo BACnet/IPv6 Apps
      run: make PREFIX=i686-w64-mingw32- BACNET_PORT=win32 clean bip6
    - name: Build Win32 Demo BACnet MS/TP Apps
      run: make PREFIX=i686-w64-mingw32- BACNET_PORT=win32 clean mstp
    - name: Build Win32 Demo IP to IPv6 Router
      run: make PREFIX=i686-w64-mingw32- BACNET_PORT=win32 clean router-ipv6
    - name: Build Win32 Demo IP to MS/TP Router
      run: make PREFIX=i686-w64-mingw32- BACNET_PORT=win32 clean router-mstp
    - name: Build Win32 Demo Gateway
      run: make PREFIX=i686-w64-mingw32- BACNET_PORT=win32 clean gateway

  piface:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    - name: Build PiFace Demo
      run: |
        gcc --version
        make clean
        make BUILD=pipeline piface

  blinkt:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    - name: Build Blinkt! Demo
      run: |
        gcc --version
        make clean
        make BUILD=pipeline blinkt

  gtk-discover:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    - name: Create Build Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq build-essential libgtk-3-dev
    - name: Build BACnet GTK Discover Demo
      run: |
        gcc --version
        make clean
        make gtk-discover

  ports-esp32:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Install PlatformIO
      run: |
        python3 -m pip install --upgrade pip
        pip3 install platformio
    - name: Build ESP32 Port
      run: |
        pio run -d ports/esp32
